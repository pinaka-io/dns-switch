version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: dns-switch
    main: ./cmd/dns-switch
    binary: dns-switch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}-
      {{- .Os }}-
      {{- .Arch }}
    files:
      - none*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

release:
  github:
    owner: pinaka-io
    name: dns-switch
  draft: false
  prerelease: auto
  mode: append
  name_template: "{{.Tag}}"
  header: |
    ## DNS Switch {{.Version}}

    Fast, user-friendly TUI for quickly switching between DNS configurations.
  footer: |
    ### Installation

    #### Homebrew (macOS/Linux)
    ```bash
    brew tap pinaka-io/tap
    brew install dns-switch
    ```

    #### Manual Installation
    Download the appropriate binary for your platform from the assets above, extract it, and move to `/usr/local/bin/`.

brews:
  - repository:
      owner: pinaka-io
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/pinaka-io/dns-switch"
    description: "Fast, user-friendly TUI for quickly switching between DNS configurations"
    license: "MIT"
    test: |
      system "#{bin}/dns-switch --version"
    post_install: |
      config_dir = HOMEBREW_PREFIX/"config/dns-switch"
      config_dir.mkpath
      config_file = config_dir/"config.yaml"
      unless config_file.exist?
        File.write(config_file, <<~EOS)
          # DNS Switch Configuration
          # Add your DNS profiles here

          dns_profiles:
            # Adguard DNS
            adguard:
              name: "AdGuard DNS"
              description: "AdGuard DNS for blocking ads and trackers"
              primary: "192.168.4.69"
              secondary: ""

            # Cloudflare DNS
            cloudflare:
              name: "Cloudflare (1.1.1.1)"
              description: "Fast and privacy-focused DNS"
              primary: "1.1.1.1"
              secondary: "1.0.0.1"

            # Google DNS
            google:
              name: "Google Public DNS"
              description: "Reliable DNS by Google"
              primary: "8.8.8.8"
              secondary: "8.8.4.4"

            # Quad9 DNS
            quad9:
              name: "Quad9 (Security)"
              description: "DNS with malware blocking"
              primary: "9.9.9.9"
              secondary: "149.112.112.112"

            # OpenDNS
            opendns:
              name: "OpenDNS"
              description: "Fast and reliable DNS"
              primary: "208.67.222.222"
              secondary: "208.67.220.220"

            # DHCP (Automatic)
            dhcp:
              name: "DHCP (Automatic)"
              description: "Use DNS provided by your network"
              primary: "auto"
              secondary: "auto"

          # Network interface to configure (e.g., "Wi-Fi", "Ethernet", "en0")
          # Leave empty to show a list of available interfaces
          network_interface: ""
        EOS
        puts "Default config file created at #{config_file}"
      end
    caveats: |
      DNS Switch requires sudo to modify network settings:
        sudo dns-switch

      Configuration file location:
        ~/.config/dns-switch/config.yaml

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch
