name: Update Homebrew Formula

on:
  release:
    types: [published]

jobs:
  update-formula:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: pinaka-io/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Get release info
        id: release_info
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download checksums
        run: |
          curl -sL https://github.com/pinaka-io/dns-switch/releases/download/${{ steps.release_info.outputs.TAG }}/checksums.txt -o checksums.txt
          cat checksums.txt

      - name: Extract SHA256 checksums
        id: checksums
        run: |
          SHA256_DARWIN_AMD64=$(grep "dns-switch-darwin-amd64.tar.gz" checksums.txt | awk '{print $1}')
          SHA256_DARWIN_ARM64=$(grep "dns-switch-darwin-arm64.tar.gz" checksums.txt | awk '{print $1}')
          SHA256_LINUX_AMD64=$(grep "dns-switch-linux-amd64.tar.gz" checksums.txt | awk '{print $1}')
          SHA256_LINUX_ARM64=$(grep "dns-switch-linux-arm64.tar.gz" checksums.txt | awk '{print $1}')

          echo "SHA256_DARWIN_AMD64=$SHA256_DARWIN_AMD64" >> $GITHUB_OUTPUT
          echo "SHA256_DARWIN_ARM64=$SHA256_DARWIN_ARM64" >> $GITHUB_OUTPUT
          echo "SHA256_LINUX_AMD64=$SHA256_LINUX_AMD64" >> $GITHUB_OUTPUT
          echo "SHA256_LINUX_ARM64=$SHA256_LINUX_ARM64" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          cat > homebrew-tap/Formula/dns-switch.rb << 'EOF'
          class DnsSwitch < Formula
            desc "Fast, user-friendly TUI for quickly switching between DNS configurations"
            homepage "https://github.com/pinaka-io/dns-switch"
            version "${{ steps.release_info.outputs.VERSION }}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/pinaka-io/dns-switch/releases/download/${{ steps.release_info.outputs.TAG }}/dns-switch-darwin-arm64.tar.gz"
                sha256 "${{ steps.checksums.outputs.SHA256_DARWIN_ARM64 }}"
              else
                url "https://github.com/pinaka-io/dns-switch/releases/download/${{ steps.release_info.outputs.TAG }}/dns-switch-darwin-amd64.tar.gz"
                sha256 "${{ steps.checksums.outputs.SHA256_DARWIN_AMD64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/pinaka-io/dns-switch/releases/download/${{ steps.release_info.outputs.TAG }}/dns-switch-linux-arm64.tar.gz"
                sha256 "${{ steps.checksums.outputs.SHA256_LINUX_ARM64 }}"
              else
                url "https://github.com/pinaka-io/dns-switch/releases/download/${{ steps.release_info.outputs.TAG }}/dns-switch-linux-amd64.tar.gz"
                sha256 "${{ steps.checksums.outputs.SHA256_LINUX_AMD64 }}"
              end
            end

            def install
              if OS.mac?
                if Hardware::CPU.arm?
                  bin.install "dns-switch-darwin-arm64" => "dns-switch"
                else
                  bin.install "dns-switch-darwin-amd64" => "dns-switch"
                end
              else
                if Hardware::CPU.arm?
                  bin.install "dns-switch-linux-arm64" => "dns-switch"
                else
                  bin.install "dns-switch-linux-amd64" => "dns-switch"
                end
              end
            end

            def caveats
              <<~EOS
                DNS Switch requires sudo to modify network settings:
                  sudo dns-switch

                Configuration file location:
                  ~/.config/dns-switch/config.yaml
              EOS
            end

            test do
              assert_match "dns-switch", shell_output("#{bin}/dns-switch --version")
            end
          end
          EOF

      - name: Commit and push formula
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dns-switch.rb
          git commit -m "Update dns-switch to ${{ steps.release_info.outputs.VERSION }}"
          git push
